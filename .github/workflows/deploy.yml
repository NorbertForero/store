name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Paso crítico 1: Instalar el binario de cloudflared en el runner de GitHub
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # Paso crítico 2: Crear la configuración SSH para que use el túnel
      - name: Configure SSH Proxy
        run: |
          mkdir -p ~/.ssh
          cat <<EOF >> ~/.ssh/config
          Host ssh.nforero.com
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      # Paso 3: Ejecutar el despliegue
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.nforero.com
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /var/www/store && \
            git pull origin main && \
            cd api && npm install && pm2 restart api && \
            cd ../tiendaOnline && npm install && npm run build && \
            cd ../adminPanel && npm install && npm run build