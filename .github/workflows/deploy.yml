name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Instalar cloudflared
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # 2. Configurar la llave SSH
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat <<EOF >> ~/.ssh/config
          Host ssh.nforero.com
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
          EOF

      # 3. Ejecutar el despliegue con SSH nativo
      - name: Run Deploy Script
        run: |
          ssh ssh.nforero.com << 'EOF'
            echo  "Agregando llave SSH al agente y desplegando aplicación..." && \
            eval "$(ssh-agent -s)" && ssh-add ~/.ssh/nf_store && \
            echo  "Ingresando al repo" && \
            cd /var/www/store && \
            echo  "Actualizando el repo" && \
            git pull origin main && \
            echo  "Instalando dependencias y reiniciando API" && \
            cd api && npm install && pm2 restart api && \
            echo  "Construyendo tienda online" && \
            cd ../tiendaOnline && npm install && npm run build && \
            echo  "Construyendo panel de administración" && \
            cd ../adminPanel && npm install && npm run build
            echo  "Despliegue completado" && \
          EOF